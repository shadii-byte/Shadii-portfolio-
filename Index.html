<!-- START index.html -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Patrick Shadrack Wanjohi — Kenyan writer, engineer, thinker. Essays on identity, money, and a generation figuring it out.">
  <meta name="theme-color" content="#1a1a1a">
  <title>Patrick Shadrack — Writer & Builder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      --bg: #faf9f7;
      --bg-warm: #f5f3ef;
      --ink: #1a1a1a;
      --ink-soft: #3d3d3d;
      --ink-light: #6b6b6b;
      --ink-muted: #9a9a9a;
      --accent: #c0392b;
      --accent-hover: #a93226;
      --border: #e8e5e0;
      --border-light: #f0ede8;
      --white: #ffffff;
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
      --shadow: 0 4px 24px rgba(0,0,0,0.06);
      --shadow-lg: 0 12px 48px rgba(0,0,0,0.08);
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      --transition-slow: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      --radius-sm: 4px;
      --radius: 8px;
      --radius-lg: 12px;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html {
      scroll-behavior: smooth;
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.7;
      overflow-x: hidden;
    }

    ::selection {
      background: var(--accent);
      color: var(--white);
    }

    img {
      max-width: 100%;
      height: auto;
      display: block;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    .section-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--accent);
      font-weight: 600;
      margin-bottom: 1.5rem;
      display: block;
    }

    .nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      background: rgba(250,249,247,0.85);
      backdrop-filter: blur(20px) saturate(1.8);
      -webkit-backdrop-filter: blur(20px) saturate(1.8);
      border-bottom: 1px solid var(--border-light);
      transition: var(--transition);
    }

    .nav.scrolled {
      background: rgba(250,249,247,0.95);
      box-shadow: 0 1px 0 var(--border);
    }

    .nav-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.1rem 2rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    .nav-logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.25rem;
      font-weight: 500;
      letter-spacing: -0.02em;
      transition: var(--transition);
    }

    .nav-logo:hover {
      color: var(--accent);
    }

    .nav-links {
      display: flex;
      gap: 2.5rem;
      list-style: none;
      align-items: center;
    }

    .nav-link {
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--ink-light);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: var(--transition);
      position: relative;
    }

    .nav-link::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 0;
      height: 1.5px;
      background: var(--accent);
      transition: var(--transition);
    }

    .nav-link:hover {
      color: var(--ink);
    }

    .nav-link:hover::after {
      width: 100%;
    }

    .nav-admin {
      font-size: 0.7rem !important;
      background: var(--ink);
      color: var(--white) !important;
      padding: 0.5rem 1rem;
      border-radius: var(--radius-sm);
      letter-spacing: 0.1em;
    }

    .nav-admin::after {
      display: none !important;
    }

    .nav-admin:hover {
      background: var(--accent);
      color: var(--white) !important;
    }

    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      padding-top: 80px;
      position: relative;
    }

    .hero-inner {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4rem;
      align-items: center;
      width: 100%;
    }

    .hero-content {
      padding: 4rem 0;
    }

    .hero-tag {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--accent);
      font-weight: 600;
      margin-bottom: 2rem;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards;
    }

    .hero-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(3rem, 5.5vw, 5rem);
      font-weight: 500;
      line-height: 1.05;
      margin-bottom: 1.8rem;
      letter-spacing: -0.03em;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.15s forwards;
    }

    .hero-title em {
      font-style: italic;
      color: var(--accent);
      font-weight: 400;
    }

    .hero-desc {
      font-size: 1.05rem;
      color: var(--ink-light);
      max-width: 460px;
      margin-bottom: 2.8rem;
      font-weight: 300;
      line-height: 1.9;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.3s forwards;
    }

    .hero-cta {
      display: inline-flex;
      align-items: center;
      gap: 0.8rem;
      background: var(--ink);
      color: var(--white);
      padding: 1rem 2.2rem;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border-radius: var(--radius-sm);
      transition: var(--transition);
      opacity: 0;
      animation: fadeUp 0.8s ease 0.45s forwards;
      position: relative;
      overflow: hidden;
    }

    .hero-cta::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: var(--accent);
      transition: var(--transition);
      z-index: 0;
    }

    .hero-cta:hover::before {
      left: 0;
    }

    .hero-cta span {
      position: relative;
      z-index: 1;
    }

    .hero-cta:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }

    .hero-visual {
      position: relative;
      height: 100%;
      min-height: 500px;
      border-radius: var(--radius);
      overflow: hidden;
      opacity: 0;
      animation: fadeIn 1.2s ease 0.3s forwards;
    }

    .hero-visual img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: grayscale(10%) contrast(1.05);
      transition: var(--transition-slow);
    }

    .hero-visual:hover img {
      transform: scale(1.03);
      filter: grayscale(0%) contrast(1.05);
    }

    .about {
      border-top: 1px solid var(--border);
    }

    .about-inner {
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    .about-visual {
      position: relative;
      overflow: hidden;
      min-height: 600px;
    }

    .about-visual img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: grayscale(10%);
      transition: var(--transition-slow);
    }

    .about-visual:hover img {
      transform: scale(1.05);
      filter: grayscale(0%);
    }

    .about-content {
      padding: 6rem 4rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
      border-left: 1px solid var(--border);
    }

    .about-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 3vw, 2.6rem);
      font-weight: 500;
      line-height: 1.2;
      margin-bottom: 1.8rem;
      letter-spacing: -0.02em;
    }

    .about-text {
      font-size: 1rem;
      color: var(--ink-light);
      line-height: 1.9;
      font-weight: 300;
    }

    .about-text p + p {
      margin-top: 1.2rem;
    }

    .writing {
      padding: 8rem 0;
      border-top: 1px solid var(--border);
    }

    .writing-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 4rem;
    }

    .writing-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 3.5vw, 2.8rem);
      font-weight: 500;
      letter-spacing: -0.02em;
    }

    .writing-link {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--accent);
      font-weight: 500;
      transition: var(--transition);
      position: relative;
    }

    .writing-link::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 0;
      height: 1px;
      background: var(--accent);
      transition: var(--transition);
    }

    .writing-link:hover::after {
      width: 100%;
    }

    .posts-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: var(--border);
    }

    .post-card {
      background: var(--white);
      padding: 2.5rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      transition: var(--transition);
      position: relative;
      overflow: hidden;
    }

    .post-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 3px;
      height: 0;
      background: var(--accent);
      transition: var(--transition);
    }

    .post-card:hover {
      background: var(--bg-warm);
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }

    .post-card:hover::before {
      height: 100%;
    }

    .post-num {
      font-size: 0.7rem;
      color: var(--ink-muted);
      font-weight: 600;
      letter-spacing: 0.1em;
    }

    .post-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      font-weight: 500;
      line-height: 1.4;
      color: var(--ink);
      transition: var(--transition);
    }

    .post-card:hover .post-title {
      color: var(--accent);
    }

    .post-excerpt {
      font-size: 0.9rem;
      color: var(--ink-light);
      font-weight: 300;
      line-height: 1.8;
      flex: 1;
    }

    .post-meta {
      font-size: 0.7rem;
      color: var(--ink-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-top: 0.5rem;
    }

    .post-arrow {
      font-size: 1rem;
      color: var(--accent);
      align-self: flex-end;
      opacity: 0;
      transform: translateX(-8px);
      transition: var(--transition);
    }

    .post-card:hover .post-arrow {
      opacity: 1;
      transform: translateX(0);
    }

    .photo-strip {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr;
      height: 360px;
      border-top: 1px solid var(--border);
      overflow: hidden;
    }

    .strip-item {
      overflow: hidden;
      position: relative;
    }

    .strip-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: grayscale(15%);
      transition: var(--transition-slow);
    }

    .strip-item:hover img {
      transform: scale(1.08);
      filter: grayscale(0%);
    }

    .strip-item:nth-child(2) img,
    .strip-item:nth-child(3) img {
      border-left: 2px solid var(--white);
    }

    .newsletter {
      padding: 7rem 0;
      text-align: center;
      background: var(--bg-warm);
      border-top: 1px solid var(--border);
    }

    .newsletter-inner {
      max-width: 560px;
      margin: 0 auto;
    }

    .newsletter-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 3vw, 2.4rem);
      font-weight: 500;
      margin-bottom: 1rem;
      letter-spacing: -0.02em;
    }

    .newsletter-desc {
      color: var(--ink-light);
      font-weight: 300;
      line-height: 1.9;
      margin-bottom: 2.5rem;
    }

    .newsletter-form {
      display: flex;
      gap: 0.75rem;
    }

    .newsletter-form input {
      flex: 1;
      padding: 1rem 1.4rem;
      border: 1.5px solid var(--border);
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      background: var(--white);
      color: var(--ink);
      border-radius: var(--radius-sm);
      transition: var(--transition);
    }

    .newsletter-form input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(192,57,43,0.1);
    }

    .newsletter-form input::placeholder {
      color: var(--ink-muted);
    }

    .newsletter-form button {
      padding: 1rem 2rem;
      background: var(--ink);
      color: var(--white);
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: pointer;
      border-radius: var(--radius-sm);
      transition: var(--transition);
      white-space: nowrap;
    }

    .newsletter-form button:hover {
      background: var(--accent);
      transform: translateY(-1px);
      box-shadow: var(--shadow);
    }

    .newsletter-success {
      color: var(--accent);
      font-size: 0.9rem;
      margin-top: 1.2rem;
      font-weight: 500;
      opacity: 0;
      transition: var(--transition);
    }

    .newsletter-success.show {
      opacity: 1;
    }

    .contact {
      padding: 7rem 0;
      border-top: 1px solid var(--border);
    }

    .contact-inner {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5rem;
      align-items: start;
    }

    .contact-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 3.5vw, 2.8rem);
      font-weight: 500;
      line-height: 1.2;
      margin-bottom: 1.2rem;
      letter-spacing: -0.02em;
    }

    .contact-desc {
      color: var(--ink-light);
      font-weight: 300;
      line-height: 1.9;
      max-width: 420px;
      margin-bottom: 2.2rem;
    }

    .email-link {
      font-family: 'Playfair Display', serif;
      font-size: 1.25rem;
      font-style: italic;
      color: var(--accent);
      border-bottom: 1px solid transparent;
      transition: var(--transition);
      display: inline-block;
      margin-bottom: 0.8rem;
    }

    .email-link:hover {
      border-bottom-color: var(--accent);
    }

    .phone-display {
      font-size: 1rem;
      color: var(--ink-soft);
      font-weight: 400;
      letter-spacing: 0.02em;
    }

    .socials {
      display: flex;
      flex-direction: column;
    }

    .social-item {
      display: flex;
      align-items: center;
      gap: 1.2rem;
      padding: 1.1rem 0;
      border-bottom: 1px solid var(--border-light);
      transition: var(--transition);
      font-size: 0.95rem;
    }

    .social-item:first-child {
      border-top: 1px solid var(--border-light);
    }

    .social-item:hover {
      color: var(--accent);
      padding-left: 0.5rem;
    }

    .social-icon {
      font-size: 1rem;
      color: var(--accent);
      width: 24px;
      text-align: center;
      transition: var(--transition);
    }

    .social-item:hover .social-icon {
      transform: scale(1.2);
    }

    .social-name {
      font-weight: 500;
      min-width: 100px;
      font-size: 0.9rem;
    }

    .social-handle {
      color: var(--ink-muted);
      font-weight: 300;
      font-size: 0.85rem;
      transition: var(--transition);
    }

    .social-item:hover .social-handle {
      color: var(--accent);
    }

    .social-arrow {
      margin-left: auto;
      font-size: 0.75rem;
      opacity: 0;
      transform: translateX(-4px);
      transition: var(--transition);
    }

    .social-item:hover .social-arrow {
      opacity: 1;
      transform: translateX(0);
    }

    .footer {
      background: var(--ink);
      color: rgba(255,255,255,0.45);
      text-align: center;
      padding: 2.5rem;
      font-size: 0.8rem;
      letter-spacing: 0.05em;
    }

    .footer span {
      color: rgba(255,255,255,0.85);
      font-weight: 500;
    }

    body.dark-mode {
      --bg: #121212;
      --bg-warm: #1a1a1a;
      --ink: #f0ece3;
      --ink-soft: #d4cfc6;
      --ink-light: #a8a29e;
      --ink-muted: #78716c;
      --border: #2a2a2a;
      --border-light: #1f1f1f;
      --white: #1e1e1e;
      --accent: #e74c3c;
      --accent-hover: #c0392b;
    }

    body.dark-mode .nav {
      background: rgba(18,18,18,0.85);
      border-bottom-color: var(--border);
    }

    body.dark-mode .post-card {
      background: var(--white);
    }

    body.dark-mode .post-card:hover {
      background: var(--bg-warm);
    }

    body.dark-mode .newsletter {
      background: var(--bg-warm);
    }

    body.dark-mode .newsletter-form input {
      background: var(--white);
      border-color: var(--border);
      color: var(--ink);
    }

    .theme-toggle {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: var(--ink);
      color: var(--white);
      border: none;
      cursor: pointer;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow-lg);
      z-index: 999;
      transition: var(--transition);
    }

    .theme-toggle:hover {
      transform: scale(1.1) rotate(15deg);
      background: var(--accent);
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    .fade-in {
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 0.8s ease, transform 0.8s ease;
    }

    .fade-in.visible {
      opacity: 1;
      transform: translateY(0);
    }

    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--ink-muted);
    }

    @media (max-width: 900px) {
      .hero-inner {
        grid-template-columns: 1fr;
        gap: 2rem;
      }

      .hero-visual {
        min-height: 300px;
        order: -1;
      }

      .about-inner {
        grid-template-columns: 1fr;
      }

      .about-visual {
        min-height: 350px;
      }

      .about-content {
        border-left: none;
        padding: 3rem 2rem;
      }

      .writing {
        padding: 4rem 0;
      }

      .posts-grid {
        grid-template-columns: 1fr;
      }

      .photo-strip {
        grid-template-columns: 1fr 1fr;
        height: auto;
      }

      .strip-item {
        height: 200px;
      }

      .photo-strip .strip-item:first-child {
        grid-column: span 2;
        height: 280px;
      }

      .contact-inner {
        grid-template-columns: 1fr;
        gap: 3rem;
      }

      .newsletter {
        padding: 4rem 0;
      }

      .newsletter-form {
        flex-direction: column;
      }

      .nav-links {
        gap: 1.5rem;
      }
    }

    @media (max-width: 480px) {
      .hero-title {
        font-size: 2.5rem;
      }

      .nav-links .nav-link:not(.nav-admin) {
        display: none;
      }

      .container {
        padding: 0 1.5rem;
      }
    }
  </style>
</head>
<body>

  <nav class="nav" id="navbar">
    <div class="nav-inner">
      <a href="#" class="nav-logo">Shadii</a>
      <ul class="nav-links">
        <li><a href="#about" class="nav-link">About</a></li>
        <li><a href="#writing" class="nav-link">Writing</a></li>
        <li><a href="#contact" class="nav-link">Contact</a></li>
